# =============================================================================
# Outil de vigilance pré-krach — configuration (Phase 1)
# Ajouter un signe plus tard = ajouter une entrée ici, pas réécrire le code.
# =============================================================================
# Champs par métrique :
#   key          : identifiant interne (nom du fichier de cache/fixture = série)
#   series       : ID de série FRED, ou nom logique pour les sources non-FRED
#   source       : fred | shiller | aaii | cboe | finra
#   transform    : level | yoy_pct | ratio_gdp | hp_gap
#   danger       : high | low  → sens du danger sur la valeur TRANSFORMÉE
#   min_hist_months : historique minimal avant de produire un z-score (défaut 120)
#   optional     : true → l'indisponibilité n'est pas bloquante (affichée "indisponible")
#
# Statut de validation des ID FRED (05/07/2026) :
#   QUSPAM770A   ✅ vérifié (BIS crédit privé non financier / PIB, T4 1947 → T3 2025)
#   DRTSCILM     ✅ vérifié (SLOOS, T2 1990 → T2 2026)
#   NCBEILQ027S  ✅ vérifié (Z.1, T4 1945 → T1 2026) — remplace WILL5000INDFC,
#                   retiré de FRED le 3 juin 2024 (données Wilshire supprimées)
#   GDP, T10Y3M, M2SL, DFII10, VIXCLS, BAMLH0A0HYM2 : standards, à confirmer
#   au premier appel API réel → `python test_fred.py`

# -----------------------------------------------------------------------------
# POIDS re-dérivés le 2026-07-06 (tâche 3 v4) depuis le pouvoir prédictif RÉEL,
# validés par Vincent. Méthode (common.pouvoir_predictif, calibrate.py) :
#   NSR = B/A (Kaminsky-Reinhart, même unité : proportion de mois)
#     A = part des mois >= orange en fenêtre pré-krach T-18..T-6 (PERSISTANCE)
#     B = part des mois tranquilles >= orange (hors T-18..T+24 de tout krach)
#   poids = racine(1/NSR) (compresse sans changer l'ordre), somme conservée
#   (87.33 sur les 11 signes mesurés), puis contraintes anti-sur-apprentissage :
#     - indicatif (< 4 krachs couverts OU < 3 krachs persistants, persistant =
#       >= 50 % des mois de SA fenêtre en alerte) -> plafond 1.0x la moyenne.
#       Capturés : fragilité (1 seul krach persistant : 2008 — d'où son plafond
#       malgré le meilleur NSR 0.23), surchauffe (1 : 1973), inégalités
#       (3 couverts), prime_risque (2 persistants), standards_pret (0).
#     - plafond général 1.5x la moyenne (crédit 11.79 passe juste dessous).
#     - bruité (NSR >= 1) -> plancher 0.25x + badge : prime_risque (NSR 2.34),
#       standards_pret (3.63). Information affichée, jamais exclue.
#   Détail : output/pouvoir_predictif_signes.csv. Poids des signes SANS données
#   (euphorie, qualitatifs n°4/n°7) inchangés : hors composite tant que gris.
# -----------------------------------------------------------------------------

provenance_poids: >-
  Poids re-dérivés le 2026-07-06 (NSR v4) : racine(1/NSR), fenêtre pré-krach
  T-18..T-6, plafond indicatif 1.0x moyenne (<4 krachs couverts ou <3
  persistants), plafond général 1.5x, plancher bruité 0.25x (NSR>=1) ;
  somme 87.33 conservée. Voir en-tête de ce fichier et pouvoir_predictif().

normalisation:
  # Z-score en fenêtre EXPANSIVE (point-in-time : seule l'histoire passée est
  # utilisée) — même méthode pour l'historique et le présent (§7 du brief).
  methode: zscore_expansif
  min_hist_months: 120
  seuils:            # sur le z orienté (positif = danger)
    vert: 0.5        # z < 0.5  → vert
    orange: 1.5      # z < 1.5  → orange ; sinon rouge

krachs:              # date = début du krach ; empreinte relevée à T-12 mois
  - {nom: "1929",    date: "1929-09-01"}
  - {nom: "1937",    date: "1937-03-01"}
  - {nom: "1973-74", date: "1973-01-01"}
  - {nom: "1987",    date: "1987-10-01"}
  - {nom: "2000",    date: "2000-03-01"}
  - {nom: "2008",    date: "2008-09-01"}
  - {nom: "2020",    date: "2020-02-01"}

signes:
  - key: credit
    numero: 1
    nom: "Expansion excessive du crédit / levier"
    poids: 11.79   # NSR v4 2026-07-06 — ancien 8.03
    approximatif: false
    metrics:
      - key: credit_gdp_gap
        description: "Crédit privé non financier / PIB (BIS) — écart à la tendance (gap, type BIS)"
        source: fred
        series: QUSPAM770A
        transform: hp_gap
        danger: high
      - key: margin_debt_yoy
        description: "Dette sur marge FINRA — croissance sur 12 mois (%)"
        source: finra
        series: margin_debt
        transform: yoy_pct
        danger: high
        optional: true   # pas d'API FINRA stable → fichier manuel data/manual/margin_debt.csv

  - key: euphorie
    numero: 2
    nom: "Euphorie spéculative / psychologie de foule"
    poids: 7.63
    approximatif: true   # proxies imparfaits — à marquer visuellement
    metrics:
      - key: aaii_bull_bear
        description: "Sentiment AAII — écart haussiers − baissiers (pts)"
        source: aaii
        series: aaii
        transform: level
        danger: high
        optional: true
      - key: put_call_equity
        description: "Ratio put/call actions CBOE (bas = euphorie)"
        source: cboe
        series: putcall
        transform: level
        danger: low
        optional: true

  - key: standards_pret
    numero: 3
    nom: "Innovation financière / relâchement des standards de prêt"
    poids: 3.67   # NSR v4 2026-07-06 — ancien 7.70
    indicatif: true   # 3 krachs couverts, 0 persistant
    bruite: true   # NSR 3.63 : bruit > signal
    approximatif: false
    metrics:
      - key: sloos_ci
        description: "SLOOS — % net de banques durcissant les prêts C&I (bas/négatif = relâchement)"
        source: fred
        series: DRTSCILM
        transform: level
        danger: low
        min_hist_months: 60   # série courte (débute 1990)

  - key: survalorisation
    numero: 5
    nom: "Survalorisation / prix vs fondamentaux"
    poids: 9.14   # NSR v4 2026-07-06 — ancien 7.44
    approximatif: false
    metrics:
      - key: cape
        description: "CAPE de Shiller (P/E ajusté du cycle, depuis 1871)"
        source: shiller
        series: shiller_cape
        transform: level
        danger: high
      - key: buffett
        description: "« Indicateur Buffett » : actions sociétés non financières (Z.1) / PIB (%) — remplace Wilshire/PIB (série retirée de FRED)"
        source: fred
        series: NCBEILQ027S
        transform: ratio_gdp
        danger: high

  - key: monetaire
    numero: 9
    nom: "Conditions monétaires accommodantes"
    poids: 10.86   # NSR v4 2026-07-06 — ancien 7.90
    approximatif: false
    metrics:
      - key: courbe_10a3m
        description: "Pente de la courbe 10 ans − 3 mois (pts %) — basse/inversée = danger"
        source: fred
        series: T10Y3M
        transform: level
        danger: low
      - key: m2_yoy
        description: "M2 — croissance sur 12 mois (%)"
        source: fred
        series: M2SL
        transform: yoy_pct
        danger: high
      - key: taux_reel_10a
        description: "Taux réel 10 ans (TIPS, %) — bas = accommodant"
        source: fred
        series: DFII10
        transform: level
        danger: low
        min_hist_months: 60   # série débute 2003

  - key: prime_risque
    numero: 10
    nom: "Compression des primes de risque / complaisance"
    poids: 4.57   # NSR v4 2026-07-06 — ancien 7.80
    indicatif: true   # 2 krachs persistants sur 7 couverts
    bruite: true   # NSR 2.34 : bruit > signal
    approximatif: false
    metrics:
      # hy_oas (BAMLH0A0HYM2) RETIRÉ du calcul le 05/07/2026 : depuis avril
      # 2026, FRED ne publie plus que 3 ans glissants d'historique ICE BofA
      # (« this series will only include 3 years of observations ») → z-score
      # sur base historique impossible. Remplacé par le spread Baa−Aaa de
      # Moody's (mensuel depuis 1919, couvre même 1929). Ré-activable si
      # une source longue est trouvée.
      - key: baa_aaa_spread
        description: "Spread obligataire Baa − Aaa Moody's (pts %, depuis 1919) — bas = compression du risque de crédit"
        source: fred
        series: BAA
        subtract_series: AAA
        transform: level
        danger: low
      - key: vix
        description: "VIX (moyenne mensuelle) — très bas = complaisance"
        source: fred
        series: VIXCLS
        transform: level
        danger: low

  # ---------------------------------------------------------------------------
  # Phase 6 — extension au-delà du MVP. Signes les mieux MESURABLES d'abord.
  # ---------------------------------------------------------------------------
  - key: fragilite
    numero: 6
    nom: "Fragilité structurelle du système financier"
    poids: 7.94   # NSR v4 2026-07-06 — ancien 8.75
    indicatif: true   # 1 seul krach persistant (2008)
    plafonne: true   # ramené à 1.0x la moyenne
    approximatif: false
    metrics:
      - key: nfci_leverage
        description: "Sous-indice « levier » du NFCI (Chicago Fed, hebdo depuis 1971) — mesures de dette et de fonds propres du système financier. Sens fixé par l'EMPREINTE (calibrate 2026-07) : z BRUT positif à T-12 avant les krachs (2008 = +1,17, le plus fort) → danger=high. La convention Chicago Fed (positif = conditions plus tendues) suggérait low, mais l'empreinte l'infirme (low = vert avant TOUS les krachs). Signal faible hors 2008 (couverture 1971→, 4 krachs seulement)."
        source: fred
        series: NFCILEVERAGE
        transform: level
        danger: high

  - key: surchauffe
    numero: 12
    nom: "Surchauffe des transactions (volumes, IPO, margin)"
    poids: 7.92   # NSR v4 2026-07-06 — ancien 7.63
    indicatif: true   # 1 seul krach persistant (1973)
    approximatif: false
    metrics:
      - key: margin_loans_z1
        description: "Prêts sur marge / créances clients dues aux courtiers (Fed Z.1, trimestriel depuis 1945) — croissance sur 12 mois (%). Forte accélération = surchauffe (ex. 1929, 2000, 2021)."
        source: fred
        series: BOGZ1FL663067003Q
        transform: yoy_pct
        danger: high
      - key: ipo_volume
        description: "Volume d'introductions en bourse (IPO) — croissance 12 mois. Proxy APPROXIMATIF de surchauffe du marché primaire."
        source: manual
        series: ipo_volume
        transform: yoy_pct
        danger: high
        optional: true
        approximatif: true   # métrique ≈ : fichier manuel data/manual/ipo_volume.csv

  - key: desequilibres
    numero: 8
    nom: "Déséquilibres globaux / flux de capitaux"
    poids: 9.0   # NSR v4 2026-07-06 — ancien 8.50
    approximatif: false
    metrics:
      - key: current_account_gdp
        description: "Balance courante US (base NIPA, NETFI) rapportée au PIB — un déficit qui se creuse (valeur basse) = entrées de capitaux / déséquilibre externe = danger. SENS À VALIDER sur l'empreinte (comme le signe 6). Le z-score étant insensible à l'échelle, ratio_gdp reste correct malgré l'unité NIPA."
        source: fred
        series: NETFI
        transform: ratio_gdp
        danger: low

  - key: inegalites
    numero: 15
    nom: "Montée des inégalités / concentration des richesses"
    poids: 7.39   # NSR v4 2026-07-06 — ancien 8.33
    indicatif: true   # 3 krachs couverts seulement
    approximatif: false
    metrics:
      - key: top1_wealth_share
        description: "Part du patrimoine net détenue par le top 1 % (Distributional Financial Accounts de la Fed, trimestriel depuis 1989) — concentration croissante = danger."
        source: fred
        series: WFRBST01134
        transform: level
        danger: high

  # ---------------------------------------------------------------------------
  # Signes QUALITATIFS (jugement, pas de donnée publique automatique fiable).
  # Marqués `qualitatif: true` → badge distinct, GRIS et hors composite tant
  # qu'aucun fichier manuel n'est fourni. Ne jamais les confondre avec une mesure.
  # ---------------------------------------------------------------------------
  - key: dereglementation
    numero: 7
    nom: "Complaisance réglementaire / déréglementation"
    poids: 8.43
    approximatif: false
    qualitatif: true
    metrics:
      - key: dereg_score
        description: "Climat de déréglementation financière — JUGEMENT (pas une mesure). Épisodes marquants : Gramm-Leach-Bliley 1999, CFMA 2000, assouplissement du net capital rule SEC 2004, détricotage Dodd-Frank. Proxy objectif possible : indice de restrictions réglementaires RegData/Mercatus (sens inversé). En attente d'un fichier data/manual/dereg_score.csv (date,value ; valeur haute = déréglementation forte = danger)."
        source: manual
        series: dereg_score
        transform: level
        danger: high
        optional: true
        qualitatif: true

  - key: narratif
    numero: 4
    nom: "Déplacement / narratif « cette fois c'est différent »"
    poids: 7.78
    approximatif: false
    qualitatif: true
    metrics:
      - key: narrative_score
        description: "Intensité du récit « cette fois c'est différent » justifiant des valorisations extrêmes — JUGEMENT (pas une mesure). Typiquement : nouvelle techno ou instrument financier (chemins de fer, dot-com, subprime/titrisation, IA). Proxy possible : fréquence média/Google Trends de la formule, ou nombre d'articles « new paradigm ». En attente d'un fichier data/manual/narrative_score.csv (date,value ; valeur haute = récit euphorique dominant = danger)."
        source: manual
        series: narrative_score
        transform: level
        danger: high
        optional: true
        qualitatif: true

  - key: reflexivite
    numero: 11
    nom: "Réflexivité / boucles de rétroaction"
    poids: 7.22   # NSR v4 2026-07-06 — ancien 7.75
    approximatif: true   # proxy AUTOMATIQUE mais indirect du concept — marqué ≈
    metrics:
      - key: net_equity_issuance_gdp
        description: "Émissions nettes d'actions des sociétés non financières (Fed Z.1) rapportées au PIB — proxy ≈ de la boucle réflexive « prix ↑ → rachats financés par dette → prix ↑ ». Fortement NÉGATIF = rachats nets massifs = boucle auto-entretenue → danger sur les valeurs basses (danger=low). SENS À VALIDER sur l'empreinte (comme signes 6/8). z-score insensible à l'échelle → ratio_gdp correct."
        source: fred
        series: BOGZ1FU103164103Q
        transform: ratio_gdp
        danger: low

  - key: ponzi
    numero: 13
    nom: "Dynamique « Ponzi » / refinancement perpétuel"
    poids: 7.82   # NSR v4 2026-07-06 — ancien 7.50
    approximatif: true   # proxy AUTOMATIQUE mais indirect — marqué ≈
    metrics:
      - key: corp_debt_to_profits
        description: "Dette des sociétés non financières (BCNSDODNS) ÷ leurs profits après impôt (NFCPATAX) — « années de profits pour rembourser la dette » (Z.1/NIPA, depuis 1947). Ratio élevé = dette qui dépasse la capacité à la servir par les résultats = dynamique Minsky « Ponzi » (dépendance au refinancement) → danger=high. Proxy ≈ mais AUTOMATIQUE et backtestable sur tous les krachs depuis ~1957. z-score insensible à l'échelle. SENS À VALIDER sur l'empreinte."
        source: fred
        series: BCNSDODNS
        divide_series: NFCPATAX
        transform: level
        danger: high
